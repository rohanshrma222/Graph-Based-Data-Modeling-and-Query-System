services:
  - type: web
    name: dodgeai-backend
    env: python
    rootDir: .
    buildCommand: pip install -r backend/requirements.txt
    startCommand: python -m uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.0-flash
      - key: DATABASE_URL
        value: sqlite:///./backend/app.db
      - key: DATA_DIR
        value: ./data
